name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install hatch
      run: pip install hatch

    - name: Run tests
      run: hatch run pytest tests/ -q --tb=short
      env:
        # Integration tests requiring real API keys are skipped when these are absent
        OPENAI_API_KEY: ""
        ANTHROPIC_API_KEY: ""
        GEMINI_API_KEY: ""
