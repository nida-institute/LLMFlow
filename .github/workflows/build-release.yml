name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: llmflow-linux
            asset_name: llmflow-linux-x64
          - os: macos-latest
            artifact_name: llmflow-macos
            asset_name: llmflow-macos-x64
          - os: windows-latest
            artifact_name: llmflow-windows.exe
            asset_name: llmflow-windows-x64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set
        pip install -e .

    - name: Install C compiler (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache patchelf

    - name: Install C compiler (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build with Nuitka (Unix)
      if: runner.os != 'Windows'
      run: |
        python -m nuitka --standalone --onefile \
          --include-package=llmflow \
          --include-package-data=puremagic \
          --include-package-data=llm \
          --include-data-dir=prompts=prompts \
          --include-data-dir=templates=templates \
          --output-dir=nuitka_dist \
          --output-filename=${{ matrix.artifact_name }} \
          src/llmflow/cli.py

    - name: Build with Nuitka (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m nuitka --standalone --onefile --assume-yes-for-downloads --include-package=llmflow --include-package-data=puremagic --include-package-data=llm --include-data-dir=prompts=prompts --include-data-dir=templates=templates --output-dir=nuitka_dist --output-filename=${{ matrix.artifact_name }} src/llmflow/cli.py

    - name: Smoke test binary (Unix)
      if: runner.os != 'Windows'
      run: |
        BIN=./nuitka_dist/${{ matrix.artifact_name }}
        $BIN --version
        $BIN lint --pipeline tests/fixtures/smoke.yaml
        $BIN run --pipeline tests/fixtures/smoke.yaml --dry-run

    - name: Smoke test binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $bin = ".\nuitka_dist\${{ matrix.artifact_name }}"
        & $bin --version
        & $bin lint --pipeline tests/fixtures/smoke.yaml
        & $bin run --pipeline tests/fixtures/smoke.yaml --dry-run

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: nuitka_dist/${{ matrix.artifact_name }}
        retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Display structure of downloaded files
      run: ls -R ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/llmflow-linux-x64/llmflow-linux
          artifacts/llmflow-macos-x64/llmflow-macos
          artifacts/llmflow-windows-x64.exe/llmflow-windows.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
