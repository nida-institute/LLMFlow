name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create draft release
      run: |
        gh release create "${{ github.ref_name }}" \
          --draft \
          --generate-notes \
          --title "${{ github.ref_name }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || !startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: llmflow-linux
            asset_name: llmflow-linux
          - os: macos-latest
            artifact_name: llmflow-macos
            asset_name: llmflow-macos
          - os: windows-latest
            artifact_name: llmflow-windows.exe
            asset_name: llmflow-windows.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka ordered-set
        pip install -e .
        pip install llm-anthropic llm-gemini

    - name: Install C compiler (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache patchelf

    - name: Install C compiler (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build with Nuitka (Unix)
      if: runner.os != 'Windows'
      run: |
        python -m nuitka --standalone --onefile \
          --include-package=llmflow \
          --include-package=llm \
          --include-package-data=puremagic \
          --include-package-data=llm \
          --include-package=llm_anthropic \
          --include-package=llm_gemini \
          --include-data-dir=prompts=prompts \
          --include-data-dir=templates=templates \
          --output-dir=nuitka_dist \
          --output-filename=${{ matrix.artifact_name }} \
          src/llmflow/cli.py

    - name: Build with Nuitka (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m nuitka --standalone --onefile --assume-yes-for-downloads --include-package=llmflow --include-package=llm --include-package-data=puremagic --include-package-data=llm --include-package=llm_anthropic --include-package=llm_gemini --include-data-dir=prompts=prompts --include-data-dir=templates=templates --output-dir=nuitka_dist --output-filename=${{ matrix.artifact_name }} src/llmflow/cli.py

    - name: Smoke test binary (Unix)
      if: runner.os != 'Windows'
      run: |
        BIN=./nuitka_dist/${{ matrix.artifact_name }}
        $BIN --version
        $BIN lint --pipeline tests/fixtures/smoke.yaml
        $BIN run --pipeline tests/fixtures/smoke.yaml --dry-run

    - name: Smoke test binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $bin = ".\nuitka_dist\${{ matrix.artifact_name }}"
        & $bin --version
        & $bin lint --pipeline tests/fixtures/smoke.yaml
        & $bin run --pipeline tests/fixtures/smoke.yaml --dry-run

    - name: Upload binary to release (Unix)
      if: runner.os != 'Windows' && startsWith(github.ref, 'refs/tags/')
      run: |
        gh release upload "${{ github.ref_name }}" \
          "nuitka_dist/${{ matrix.artifact_name }}#${{ matrix.asset_name }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload binary to release (Windows)
      if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        gh release upload "${{ github.ref_name }}" "nuitka_dist/${{ matrix.artifact_name }}#${{ matrix.asset_name }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Publish release
      run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-install:
    name: Verify install script on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify install script (Unix)
      if: runner.os != 'Windows'
      run: |
        bash install.sh
        "$HOME/bin/llmflow" --version

    - name: Verify install script (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
        PowerShell -ExecutionPolicy Bypass -File install.ps1
        & "$env:USERPROFILE\bin\llmflow.exe" --version
