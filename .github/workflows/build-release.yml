name: Build and Release Executables

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: llmflow-linux
            asset_name: llmflow-linux-x64
          - os: macos-latest
            artifact_name: llmflow-macos
            asset_name: llmflow-macos-x64
          - os: windows-latest
            artifact_name: llmflow-windows.exe
            asset_name: llmflow-windows-x64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -e .

    - name: Build with PyInstaller (Unix)
      if: runner.os != 'Windows'
      run: |
        pyinstaller --onefile \
          --name ${{ matrix.artifact_name }} \
          --add-data "prompts:prompts" \
          --add-data "templates:templates" \
          --hidden-import llmflow \
          --hidden-import llmflow.cli \
          --hidden-import llmflow.runner \
          --hidden-import llmflow.utils \
          --hidden-import llmflow.modules \
          --hidden-import llmflow.plugins \
          --hidden-import decimal \
          --hidden-import fractions \
          --hidden-import rich \
          --hidden-import rich.console \
          --hidden-import rich.table \
          --hidden-import rich._ratio \
          --hidden-import httpx \
          --collect-all rich \
          --collect-all httpx \
          src/llmflow/cli.py

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile `
          --name ${{ matrix.artifact_name }} `
          --add-data "prompts;prompts" `
          --add-data "templates;templates" `
          --hidden-import llmflow `
          --hidden-import llmflow.cli `
          --hidden-import llmflow.runner `
          --hidden-import llmflow.utils `
          --hidden-import llmflow.modules `
          --hidden-import llmflow.plugins `
          --hidden-import decimal `
          --hidden-import fractions `
          --hidden-import rich `
          --hidden-import rich.console `
          --hidden-import rich.table `
          --hidden-import rich._ratio `
          --hidden-import httpx `
          --collect-all rich `
          --collect-all httpx `
          src/llmflow/cli.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}
        retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Display structure of downloaded files
      run: ls -R ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/llmflow-linux-x64/llmflow-linux
          artifacts/llmflow-macos-x64/llmflow-macos
          artifacts/llmflow-windows-x64.exe/llmflow-windows.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
