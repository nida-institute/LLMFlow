name: Expand and Save Abbott-Smith Entries
variables:
  prompts_dir: prompts/semdom-greek
  output_dir: ./obsidian/grc

steps:
  # Step 1: Read first 10 rows from status.tsv
  - name: read-status
    type: tsv
    inputs:
      path: inputs/Abbot-Smith/status.tsv
      limit: 50
    outputs:
      - status_rows

  # Step 2: For each row, find entry and process
  - name: process-entries
    type: for-each
    input: "${status_rows}"
    item_var: row
    steps:
      # Find the entry in Abbott-Smith for this lemma
      - name: find-entry
        type: xpath
        inputs:
          path: inputs/Abbot-Smith/abbott-smith.tei.xml
          xpath: //tei:entry[@key='${row.lemma}']
          output_format: xml-string
          namespaces:
            tei: "http://www.crosswire.org/2013/TEIOSIS/namespace"
        outputs: [entries]
        log: debug
        saveas:
          path: "${output_dir}/xml/${row.lemma}.xml"
          group_by_prefix: 2  # Organizes: ./obsidian/grc/xml/συ/σύ.xml

      # Expand with LLM - take first entry from the list
      - name: expand-entry
        type: llm
        model: gpt-4o
        temperature: 0.7
        max_tokens: 6000
        prompt:
          file: expand-abbott-smith.gpt
          inputs:
            entry: "${entries[0]}"  # Take first item from list
            lemma: "${row.lemma}"
            status: "${row.status}"
        outputs:
          - expanded_entry
        saveas:
          path: "${output_dir}/markdown/${row.lemma}.md"
          group_by_prefix:
            prefix_length: 2  # Organizes: ./obsidian/grc/markdown/συ/σύ.md
        log: debug

