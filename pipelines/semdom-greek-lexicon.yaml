name: Expand and Save Abbott-Smith Entries
variables:  # Change back to 'variables:'
  prompts_dir: prompts/semdom-greek

steps:
  - name: extract-all-entries
    type: xpath  # Use the plugin type directly, not function
    path: inputs/Abbot-Smith/abbott-smith.tei.xml
    xpath: //tei:entry
    output_format: xml-string
    namespaces:
      tei: "http://www.crosswire.org/2013/TEIOSIS/namespace"
    outputs:
      - entries

  - name: iterate-over-entries
    type: for-each
    input: "${entries}"
    item_var: entry
    steps:

      - name: extract-entry-key
        type: function
        function: llmflow.utils.xml.xpath_get
        inputs:
          xml: "${entry}"
          xpath: "@key"
          namespaces:
            tei: "http://www.crosswire.org/2013/TEIOSIS/namespace"
        outputs:
          - entry_key

      - name: expand-entry-with-llm
        type: llm
        model: gpt-4o
        temperature: 0.7
        max_tokens: 6000
        prompt:
          file: expand-abbott-smith.gpt
          inputs:
            entry: "${entry}"
        outputs:
          - expanded_entry
        saveas: "outputs/markdown/${entry_key}.md"

