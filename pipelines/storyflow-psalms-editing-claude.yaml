name: storyflow-psalms-simplified

variables:
  prompts_dir: prompts/storyflow
  output_dir: outputs/storyflow
  source: WLC
  passage: "${passage}"

llm_config:
  model: gpt-4o
  max_tokens: 4096
  temperature: 0.4

linter_config:
  enabled: true
  treat_warnings_as_errors: true

steps:
  # --- Parse and Generate Base Content ---
  - name: parse_passage_reference
    type: function
    function: llmflow.utils.data.parse_bible_reference
    inputs:
      passage: "${passage}"
    outputs: passage_info

  # Batch the exegetical generation into a single prompt if possible
  # Or keep them separate for modularity
  - name: generate_exegetical_culture
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e1.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
    outputs: exegetical_culture
    log: debug

  - name: generate_exegetical_wordstudy
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e2.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
    outputs: exegetical_wordstudy

  - name: generate_exegetical_emotionalarc
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e3.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
    outputs: exegetical_emotionalarc

  # Save exegetical guide
  - name: save_exegetical_guide
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/exegeticalguide_template.md"
      variables:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_wordstudy: "${exegetical_wordstudy}"
        exegetical_emotionalarc: "${exegetical_emotionalarc}"
    outputs: exegetical_markdown_text
    saveas: "outputs/exegetical/${passage_info.filename_prefix}_exegetical_guide.md"

  # --- Generate Scene-Based Content ---
  - name: generate_intro
    type: llm
    prompt:
      file: leadersguide-intro.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_wordstudy: "${exegetical_wordstudy}"
        exegetical_emotionalarc: "${exegetical_emotionalarc}"
    outputs: intro_response

  - name: generate_scene_list
    type: llm
    prompt:
      file: leadersguide-scenes.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_wordstudy: "${exegetical_wordstudy}"
    output_type: json
    outputs: [scene_list]

  - name: save_scene_list
    type: function
    function: llmflow.utils.io.save_json
    inputs:
      content: "${scene_list}"
      output_path: "outputs/scenes/${passage_info.filename_prefix}.json"
    outputs: [scene_json_path]

  # --- Process Each Scene ---
  - name: process_each_scene
    type: for-each
    input: "${scene_list}"
    item_var: scene
    steps:
      # Generate all content for this scene
      - name: joshfrost
        type: llm
        prompt:
          file: joshfrost-emotional.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_wordstudy: "${exegetical_wordstudy}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        outputs: joshfrost_content
        append_to: joshfrost_list

      - name: bodies
        type: llm
        prompt:
          file: leadersguide-bodies.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
        outputs: bodies_content
        append_to: bodies_list

      - name: hearts
        type: llm
        prompt:
          file: leadersguide-hearts.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_wordstudy: "${exegetical_wordstudy}"
            joshfrost: "${joshfrost_list[-1]}"
        outputs: hearts_content
        append_to: hearts_list

      - name: connecting
        type: llm
        prompt:
          file: leadersguide-connecting.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        outputs: connecting_content
        append_to: connecting_list

      - name: naming
        type: llm
        prompt:
          file: leadersguide-naming.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        outputs: naming_content
        append_to: naming_list

      # Render scene templates
      - name: render_leadersguide_scene
        type: function
        function: llmflow.utils.io.render_markdown_template
        inputs:
          template_path: "templates/leadersguide_scene_template.md"
          variables:
            scene: "${scene}"
            step1: "${bodies_list[-1]}"
            step2: "${hearts_list[-1]}"
            step3: "${connecting_list[-1]}"
            step4: "${naming_list[-1]}"
        outputs: leadersguide_scene_markdown
        append_to: leadersguide_scenes_markdown_list

      - name: render_joshfrost_scene
        type: function
        function: llmflow.utils.io.render_markdown_template
        inputs:
          template_path: "templates/joshfrost_scene_template.md"
          variables:
            scene: "${scene}"
            joshfrost_content: "${joshfrost_list[-1]}"
        outputs: joshfrost_scene_markdown
        append_to: joshfrost_scenes_markdown_list

  # --- Join Scene Lists ---
  - name: join_leadersguide_scenes
    type: function
    function: llmflow.utils.data.flatten_json_to_markdown
    inputs:
      data: "${leadersguide_scenes_markdown_list}"
    outputs: leadersguide_scenes_markdown

  - name: join_joshfrost_scenes
    type: function
    function: llmflow.utils.data.flatten_json_to_markdown
    inputs:
      data: "${joshfrost_scenes_markdown_list}"
    outputs: joshfrost_scenes_markdown

  # --- Final Assembly ---
  - name: generate_summary
    type: llm
    prompt:
      file: leadersguide-summarizing.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_emotionalarc: "${exegetical_emotionalarc}"
    outputs: summary_response

  - name: save_leaders_guide
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/leadersguide_template.md"
      variables:
        passage: "${passage}"
        intro: "${intro_response}"
        leadersguide_scenes_markdown: "${leadersguide_scenes_markdown}"
        summary: "${summary_response}"
    outputs: leaders_guide_markdown
    saveas: "outputs/leaders_guide/${passage_info.filename_prefix}_leaders_guide.md"

  - name: save_joshfrost_guide
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/joshfrost_template.md"
      variables:
        passage: "${passage}"
        joshfrost_scenes_markdown: "${joshfrost_scenes_markdown}"
    outputs: joshfrost_markdown
    saveas: "outputs/joshfrost/${passage_info.filename_prefix}_joshfrost.md"

  # --- Quality Assurance ---
  - name: qa_edit_leaders_guide
    type: llm
    prompt:
      file: leadersguide-qaedit.gpt
      inputs:
        passage_ref: "${passage}"
        leaders_guide_markdown: "${leaders_guide_markdown}"
    output_type: json
    outputs: qa_output

  - name: save_edited_guide
    type: function
    function: llmflow.utils.io.save_text
    inputs:
      content: "${qa_output.fixed_markdown}"
      output_path: "outputs/leaders_guide_edited/${passage_info.filename_prefix}_leaders_guide_edited.md"
      format: markdown

  - name: save_qa_report
    type: function
    function: llmflow.utils.io.save_json
    inputs:
      content:
        changes: "${qa_output.changes}"
        flags: "${qa_output.flags}"
        stats: "${qa_output.stats}"
      output_path: "outputs/qa_reports/${passage_info.filename_prefix}_qa_report.json"