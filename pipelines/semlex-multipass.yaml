name: SemLex Multi-Pass

variables:
  prompts_dir: prompts/semdom-greek-multipass
  output_dir: ./obsidian/grc
  xslt_dir: xslt
  limit: 5

steps:
  - name: read-status
    type: tsv
    inputs:
      path: inputs/Abbot-Smith/status.tsv
      limit: "${limit}"
    outputs:
      - status_rows

  - name: process-entries
    type: for-each
    input: "${status_rows}"
    item_var: row
    steps:
      ########################################################################
      # PHASE 0.1: ENHANCE XML STRUCTURE
      ########################################################################
      - name: enhance-xml
        type: xslt
        inputs:
          xml: "${row[source_xml]}"
          stylesheet: "${xslt_dir}/enhance-abbott-smith.xsl"
        outputs:
          - enhanced_xml
        saveas:
          path: "${output_dir}/intermediate/${row[lemma]}.enhanced.xml"
        metadata:
          phase: "xml_enhancement"
          lemma: "${row[lemma]}"
          description: "Make sense hierarchy explicit, mark up citations consistently"

      ########################################################################
      # PHASE 0.2: TRANSFORM XML TO JSON
      ########################################################################
      - name: xml-to-json
        type: xslt
        inputs:
          xml: "${enhanced_xml}"
          stylesheet: "${xslt_dir}/xml-to-json.xsl"
        outputs:
          - base_json
        saveas:
          path: "${output_dir}/intermediate/${row[lemma]}.base.json"
        metadata:
          phase: "json_transformation"
          lemma: "${row[lemma]}"
          description: "Transform enhanced XML to LLM-friendly JSON structure"

      ########################################################################
      # PHASE 1: EVIDENCE GATHERING
      ########################################################################
      - name: gather-evidence
        type: llm
        model: gpt-4o
        temperature: 0.3
        max_tokens: 16000
        prompt:
          file: ${prompts_dir}/gather-evidence.gpt
          inputs:
            lemma: "${row[lemma]}"
            pos: "${row[pos]}"
            base_json: "${base_json}"
        outputs:
          - evidence_json
        saveas:
          path: "${output_dir}/intermediate/${row[lemma]}.evidence.json"
        metadata:
          phase: "evidence_gathering"
          lemma: "${row[lemma]}"
          sources_consulted:
            - Abbott-Smith
            - BDAG
            - LSJ
            - Thayer
            - Smyth
            - BDF
            - Wallace
            - Runge
            - Levinsohn
            - Dik

      ########################################################################
      # PHASE 2: VERIFICATION
      ########################################################################
      - name: verify-citations
        type: llm
        model: gpt-4o
        temperature: 0.2
        max_tokens: 12000
        mcp:
          enabled: true
          server: bible
          tools:
            - get_passage_text
            - get_word_info
            - get_passages_for_word_sense
            - get_usfm_references_by_greek_lemma_co_occurrence
        prompt:
          file: ${prompts_dir}/verify-citations.gpt
          inputs:
            lemma: "${row[lemma]}"
            evidence_json: "${evidence_json}"
        outputs:
          - verified_json
        saveas:
          path: "${output_dir}/intermediate/${row[lemma]}.verified.json"
        metadata:
          phase: "verification"
          lemma: "${row[lemma]}"
          mcp_tools_used: true

      ########################################################################
      # PHASE 3: SENSE ANALYSIS
      ########################################################################
      - name: analyze-senses
        type: llm
        model: gpt-4o
        temperature: 0.3
        max_tokens: 10000
        prompt:
          file: ${prompts_dir}/analyze-senses.gpt
          inputs:
            lemma: "${row[lemma]}"
            verified_json: "${verified_json}"
        outputs:
          - senses_json
        saveas:
          path: "${output_dir}/intermediate/${row[lemma]}.senses.json"
        metadata:
          phase: "sense_analysis"
          lemma: "${row[lemma]}"

      ########################################################################
      # PHASE 4: FINAL RENDERING
      ########################################################################
      - name: render-entry
        type: llm
        model: gpt-4o
        temperature: 0.25
        max_tokens: 12000
        prompt:
          file: ${prompts_dir}/render-entry.gpt
          inputs:
            lemma: "${row[lemma]}"
            senses_json: "${senses_json}"
            verified_json: "${verified_json}"
        outputs:
          - final_markdown
        saveas:
          path: "${output_dir}/markdown/${row[lemma]}.md"
        metadata:
          phase: "rendering"
          lemma: "${row[lemma]}"


