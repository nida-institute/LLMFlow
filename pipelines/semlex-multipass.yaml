name: SemLex Multi-Pass (Emergency Mode)

variables:
  prompts_dir: prompts/semdom-greek-multipass
  output_dir: ./obsidian/grc
  xslt_dir: xslt
  limit: 1

mcp_servers:
  bible:
    url: "https://bible-resource-server-preview.labs.biblica.com/mcp"
    description: "Biblica Bible Resource Server"
    tools:
      - get_passage_text

steps:
  - name: read-status
    type: tsv
    description: "Load lemma status rows from the TSV tracker"
    inputs:
      path: inputs/Abbot-Smith/status.tsv
      limit: "${limit}"
    outputs:
      - status_rows

  - name: process-entries
    type: for-each
    description: "Iterate over each status row and execute the processing passes"
    input: "${status_rows}"
    item_var: row
    steps:
      ########################################################################
      # PHASE 0.0: FIND ENTRY
      ########################################################################
      - name: find-entry
        type: xpath
        description: "Select the TEI entry for the current lemma"
        inputs:
          path: inputs/Abbot-Smith/abbott-smith.tei.xml
          xpath: //tei:entry[@key='${row[lemma]}']
          output_format: xml-string
          namespaces:
            tei: "http://www.crosswire.org/2013/TEIOSIS/namespace"
        outputs:
          - entries
        saveas:
          path: "${output_dir}/intermediate/${row.lemma}.raw.xml"
          group_by_prefix: 2

      ########################################################################
      # PHASE 0.1: ENHANCE XML STRUCTURE
      ########################################################################
      - name: enhance-xml
        type: xslt
        description: "Normalize the XML structure and mark citations"
        inputs:
          stylesheet_path: xslt/annotate-abbott-smith.xslt
          xml_string: "${entries[0]}"
        outputs:
          - enhanced_xml
        saveas:
          path: "${output_dir}/intermediate/${row.lemma}.enhanced.xml"
          group_by_prefix: 2

      ########################################################################
      # PHASE 0.15: EXPAND ABBREVIATIONS
      ########################################################################
      - name: expand-abbreviations
        type: xslt
        description: "Expand abbreviations in the enhanced XML"
        inputs:
          stylesheet_path: xslt/expand-abbott-smith-abbreviations.xslt
          xml_string: "${enhanced_xml}"
        outputs:
          - expanded_xml
        saveas:
          path: "${output_dir}/intermediate/${row.lemma}.expanded.xml"
          group_by_prefix: 2

      ########################################################################
      # PHASE 0.2: TRANSFORM XML TO JSON
      ########################################################################
      - name: xml-to-json
        type: xslt
        description: "Convert the expanded XML into the base JSON payload"
        inputs:
          stylesheet_path: xslt/extract-base-json.xslt
          xml_string: "${expanded_xml}"
        outputs:
          - base_json
        saveas:
          path: "${output_dir}/intermediate/${row.lemma}.base.json"
          group_by_prefix: 2

      ########################################################################
      # 🚨 EMERGENCY MODE: FETCH GREEK PHRASES VIA MCP
      # This step fills in missing Greek phrases from sparse Abbott-Smith citations
      # Uses MCP to look up actual verse text when XML only has references
      ########################################################################
      - name: fetch-greek-phrases
        type: llm
        description: "Fetch actual Greek phrases for citations that lack them"
        model: gpt-4o
        temperature: 0.1
        max_tokens: 8000
        mcp:
          enabled: true
          server: bible
          tools:
            - get_passage_text
        prompt:
          file: fetch-greek-phrases.gpt
          inputs:
            lemma: "${row[lemma]}"
            base_json: "${base_json}"
        outputs:
          - enriched_json
        saveas:
          path: "${output_dir}/intermediate/${row.lemma}.enriched.json"
          group_by_prefix: 2

      ########################################################################
      # 🚨 EMERGENCY MODE: DIRECT RENDERING
      # Skips evidence gathering, verification, and sense analysis
      # Goes straight from enriched citations to final markdown
      ########################################################################
      - name: generate-entry
        type: llm
        description: "Generate lexicon entry directly from enriched citations"
        model: gpt-4o
        temperature: 0.3
        max_tokens: 16000
        prompt:
          file: generate-entry.gpt
          inputs:
            base_json: "${base_json}"
            senses_json: "${enriched_json}"
        outputs:
          - entry_md
        saveas:
          path: "${output_dir}/markdown/${row.lemma}.entry.md"
          group_by_prefix: 2

      ########################################################################
      # ❌ DISABLED: MULTI-PASS PIPELINE (will re-enable post-Saturday)
      ########################################################################
      # These steps are disabled to get working output quickly
      # Problem: They were not properly extracting Greek phrases from sparse XML
