name: "Test Storyflow Pipeline"
description: "Test pipeline for storyflow functionality"

llm_config:
  model: "gpt-3.5-turbo"
  temperature: 0.7

variables:
  psalm_reference: "Psalm 1:1-3"
  prompts_dir: "prompts"

steps:
  - name: "test_step"
    type: "function"
    function: "identity"
    inputs:
      reference: "${psalm_reference}"
    outputs:
      - psalm_text