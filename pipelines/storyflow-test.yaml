name: "Test Storyflow Pipeline"
description: |
  Minimal Storyflow harness used by the automated tests. Run from repo root:
    llmflow run pipelines/storyflow-test.yaml

llm_config:
  model: "gpt-4o"
  temperature: 0.7
  max_tokens: 4000

variables:
  psalm_reference: "Psalm 1:1-3"
  prompts_dir: "prompts"

steps:
  - name: "test_step"
    type: "function"
    function: "tests.test_storyflow_pipeline.mock_identity"
    inputs:
      value: "${psalm_reference}"
    outputs:
      - psalm_text