name: "Hello World Smoke Test"
description: |
  Quick check that LLMFlow can run a pipeline end-to-end. From repo root:
    llmflow run pipelines/hello-llmflow.yaml

variables:
  output_dir: "artifacts"

steps:
  - name: "compute-sum"
    type: "function"
    function: "operator.add"
    inputs:
      a: 2
      b: 2
    outputs:
      - total

  - name: "write-confirmation"
    type: "save"
    content: |
      ✅ LLMFlow is installed and running.
      2 + 2 = ${total}
      Χαίρετε από το LLMFlow!  (Hello in Greek)
      שלום מ־LLMFlow!          (Hello in Hebrew)
    saveas:
      path: "${output_dir}/hello-llmflow.txt"