name: test-interleave

variables:
  test_name: "Interleave Function Test"

steps:
  # --- Create Test Input Structure ---
  - name: create_test_input
    type: function
    function: llmflow.utils.data.create_json_dictionary
    inputs:
      step1: ["Body scene 1", "Body scene 2", "Body scene 3"]
      step2: ["Heart scene 1", "Heart scene 2", "Heart scene 3"]
      step3: ["Connect scene 1", "Connect scene 2", "Connect scene 3"]
      step4: ["Name scene 1", "Name scene 2", "Name scene 3"]
    outputs: test_input_structure
    log: info

  # --- Create Expected Output Structure ---
  - name: create_expected_output
    type: function
    function: llmflow.utils.data.create_json_dictionary
    inputs:
      expected: [
        {
          "step1": "Body scene 1",
          "step2": "Heart scene 1",
          "step3": "Connect scene 1",
          "step4": "Name scene 1"
        },
        {
          "step1": "Body scene 2",
          "step2": "Heart scene 2",
          "step3": "Connect scene 2",
          "step4": "Name scene 2"
        },
        {
          "step1": "Body scene 3",
          "step2": "Heart scene 3",
          "step3": "Connect scene 3",
          "step4": "Name scene 3"
        }
      ]
    outputs: expected_structure
    log: info

  # --- Run Actual Interleave ---
  - name: run_interleave
    type: function
    function: llmflow.utils.data.interleave
    inputs:
      json_structure: "${test_input_structure}"
    outputs: [actual_result]
    log: info

  # --- Compare Results (Updated function name) ---
  - name: compare_results
    type: function
    function: llmflow.utils.data.simple_json_compare  # ← Changed to standard library version
    inputs:
      expected: "${expected_structure.expected}"
      actual: "${actual_result}"
      test_name: "interleave_test"
    outputs: comparison_result
    log: info

  # --- Known Fail Expected Output Structure ---
  - name: create_known_fail_output
    type: function
    function: llmflow.utils.data.create_json_dictionary
    inputs:
      expected: [
        {
          "step1": "WRONG VALUE",
          "step2": "Heart scene 1",
          "step3": "Connect scene 1",
          "step4": "Name scene 1"
        },
        {
          "step1": "Body scene 2",
          "step2": "Heart scene 2",
          "step3": "Connect scene 2",
          "step4": "Name scene 2"
        },
        {
          "step1": "Body scene 3",
          "step2": "Heart scene 3",
          "step3": "Connect scene 3",
          "step4": "Name scene 3"
        }
      ]
    outputs: known_fail_structure
    log: info

  # --- Compare Known Fail Results ---
  - name: compare_known_fail
    type: function
    function: llmflow.utils.data.simple_json_compare
    inputs:
      expected: "${known_fail_structure.expected}"
      actual: "${actual_result}"
      test_name: "known_fail_test"
    outputs: known_fail_comparison
    log: info
