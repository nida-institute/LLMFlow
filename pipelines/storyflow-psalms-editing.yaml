name: storyflow-psalms

variables:
  prompts_dir: prompts/storyflow
  output_dir: outputs/storyflow
  source:  WLC

llm_config:
  model: gpt-4o
  temperature: 0.4
  max_tokens: 6000

linter_config:
  enabled: true
  treat_warnings_as_errors: true

steps:

  # --- Parse Passage Reference ---
  - name: parse_passage_reference
    type: function
    function: llmflow.utils.data.parse_bible_reference
    inputs:
      passage: "${passage}"
    outputs: passage_info

  # --- Exegetical E1–E3 Generation ---
  - name: generate_exegetical_culture
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e1.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
      outputs: exegetical_culture

  - name: generate_exegetical_wordstudy
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e2.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
    outputs: exegetical_wordstudy

  - name: generate_exegetical_emotionalarc
    type: llm
    prompt:
      file: exegetical-pericope-psalms-e3.gpt
      inputs:
        source: "${source}"
        passage: "${passage}"
    outputs: exegetical_emotionalarc

  # --- Render and Save Exegetical Guide ---
  - name: render_and_save_exegetical_guide
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/exegeticalguide_template.md"
      variables:
        passage: "${passage}"
        culture: "${exegetical_culture}"
        wordstudy: "${exegetical_wordstudy}"
        emotionalarc: "${exegetical_emotionalarc}"
    outputs: exegetical_markdown_text
    saveas: "outputs/exegetical/${passage}_exegetical_guide.md"

  # --- Generate Leader Guide Intro and Scene List ---
  - name: generate_intro
    type: llm
    prompt:
      file: leadersguide-intro.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_wordstudy: "${exegetical_wordstudy}"
        exegetical_emotionalarc: "${exegetical_emotionalarc}"
    outputs: intro_response

  - name: generate_scene_list
    type: llm
    prompt:
      file: leadersguide-scenes.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_wordstudy: "${exegetical_wordstudy}"
    output_type: json
    outputs: [scene_list]
    log: debug  # This will help debug the string vs array issue

  # --- Save Scene List JSON ---
  - name: save_scene_list
    type: function
    function: llmflow.utils.io.save_json
    inputs:
      passage: "${passage}"
      content: "${scene_list}"
      output_dir: "outputs/scenes"
    outputs: [scene_json_path]


  # --- For Each Scene (Steps 1–4) ---
  - name: process_each_scene
    type: for-each
    input: "${scene_list}"
    item_var: scene
    steps:

      # --- Generate Josh Frost Emotional Exegesis ---
      - name: joshfrost_list
        type: llm
        prompt:
          file: joshfrost-emotional.gpt
          inputs:
            passage: "${passage}"
            source: "${source}"
            scene: "${scene}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_wordstudy: "${exegetical_wordstudy}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        append_to: joshfrost_list

      - name: bodies
        type: llm
        prompt:
          file: leadersguide-bodies.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
        append_to: bodies_list

      - name: hearts
        type: llm
        prompt:
          file: leadersguide-hearts.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_wordstudy: "${exegetical_wordstudy}"
            joshfrost_list: "${joshfrost_list}"
        append_to: hearts_list

      - name: connecting
        type: llm
        prompt:
          file: leadersguide-connecting.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        append_to: connecting_list

      - name: naming
        type: llm
        prompt:
          file: leadersguide-naming.gpt
          inputs:
            passage: "${passage}"
            scene: "${scene}"
            citation: "${scene.Citation}"
            exegetical_culture: "${exegetical_culture}"
            exegetical_emotionalarc: "${exegetical_emotionalarc}"
        append_to: naming_list

  # --- Generate Leader Guide Summary ---
  - name: generate_summary
    type: llm
    prompt:
      file: leadersguide-summarizing.gpt
      inputs:
        passage: "${passage}"
        exegetical_culture: "${exegetical_culture}"
        exegetical_emotionalarc: "${exegetical_emotionalarc}"
    outputs: summary_response

  # --- Create Scene Steps JSON Structure ---
  - name: create_scene_steps_json
    type: function
    function: llmflow.utils.data.create_json_dictionary
    inputs:
      step1: "${bodies_list}"
      step2: "${hearts_list}"
      step3: "${connecting_list}"
      step4: "${naming_list}"
    outputs: scene_steps_json

  # --- Assemble Scene Steps ---
  - name: assemble_scene_steps
    type: function
    function: llmflow.utils.data.interleave
    inputs:
      json_structure: "${scene_steps_json}"
    outputs: [scene_steps]


  # --- Debugging Step ---
  - name: debug_lists
    type: function
    function: llmflow.utils.data.create_json_dictionary
    inputs:
      bodies_count: "${len(bodies_list) if bodies_list else 0}"
      hearts_count: "${len(hearts_list) if hearts_list else 0}"
      connecting_count: "${len(connecting_list) if connecting_list else 0}"
      naming_count: "${len(naming_list) if naming_list else 0}"
      bodies_first: "${bodies_list[0][:100] if bodies_list and len(bodies_list) > 0 else 'EMPTY'}"
      hearts_first: "${hearts_list[0][:100] if hearts_list and len(hearts_list) > 0 else 'EMPTY'}"
      connecting_first: "${connecting_list[0][:100] if connecting_list and len(connecting_list) > 0 else 'EMPTY'}"
      naming_first: "${naming_list[0][:100] if naming_list and len(naming_list) > 0 else 'EMPTY'}"
    outputs: debug_info
    log: info  # This will show the debug info on console


  # --- Assemble and Save Leader Guide ---
  - name: save_leaders_guide
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/leadersguide_template.md"
      variables:
        passage: "${passage}"
        intro: "${intro_response}"
        scenes: "${scene_list}"
        scene_steps: "${scene_steps}"
        summary: "${summary_response}"
    outputs: leaders_guide_markdown
    saveas: "outputs/leaders_guide/${passage_info.filename_prefix}_leaders_guide.md"

  # --- Save Josh Frost Markdown ---
  - name: save_joshfrost_md
    type: function
    function: llmflow.utils.io.render_markdown_template
    inputs:
      template_path: "templates/joshfrost_template.md"
      variables:
        passage: "${passage}"
        scenes: "${scene_list}"
        joshfrost_content: "${joshfrost_list}"
    outputs: joshfrost_markdown
    saveas: "outputs/joshfrost/${passage_info.filename_prefix}_joshfrost.md"
    log: info  # Important checkpoint

  # --- QA + Editor (light-touch, surgical edits; returns JSON) ---
  - name: qa_edit_leaders_guide
    type: llm
    prompt:
      file: leadersguide-qaedit.gpt
      inputs:
        passage_ref: "${passage}"
        leaders_guide_markdown: "${leaders_guide_markdown}"
    output_type: json
    outputs: qa_output
    saveas:
      - path: "outputs/leaders_guide_edited/${passage}_leaders_guide_edited.md"
        content: "${qa_output.fixed_markdown}"
        format: markdown
      - path: "outputs/qa_reports/${passage}_qa_report.json"
        content: "${qa_output}"
        format: json
