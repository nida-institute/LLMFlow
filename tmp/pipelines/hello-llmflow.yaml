name: "Hello Multilingual Pipeline"
description: |
  Sample pipeline generated by `llmflow init`.
  Run it with:
    llmflow run --pipeline pipelines/hello-llmflow.yaml
variables:
  prompts_dir: "prompts"
  output_dir: "output"

llm_config:
  model: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 500

steps:
  - name: "multilingual-greeting"
    type: "llm"
    prompt:
      file: "hello.gpt"
      inputs:
        language_count: 5
    outputs: greeting
    saveas:
      path: "${output_dir}/hello.md"
